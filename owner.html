<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Owner Panel - Raju's Dosa Club</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.header{
background:#fc8019;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
}

.logo{
width:60px;
height:60px;
border-radius:50%;
}

.container{
padding:20px;
}

.section{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#fc8019;
color:white;
padding:10px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

button{
padding:6px 10px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:13px;
}

.print-btn{
background:#4CAF50;
color:white;
}

.clear-btn{
background:#d32f2f;
color:white;
margin-bottom:10px;
}

.excel-btn{
background:#1976d2;
color:white;
margin-bottom:10px;
}

.total{
margin-top:10px;
font-size:18px;
font-weight:bold;
color:#2e7d32;
}

.analytics{
margin-top:10px;
font-size:16px;
font-weight:bold;
}

.no-data{
padding:15px;
color:gray;
font-weight:bold;
}

canvas{
margin-top:20px;
}

#chartBox{
display:none;
}
</style>
</head>

<body onload="initPage()">

<audio id="orderSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<div class="header">
<img src="logo.JPG" class="logo">
<div>
<h1>Raju's Dosa Club</h1>
<h3>రాజూస్ దోస క్లబ్</h3>
</div>
</div>

<div class="container">

<div class="section">

<h2>🛵 Take Away Orders</h2>

<button class="excel-btn" onclick="downloadExcel()">Download Daily Sales (Excel)</button>
<button class="clear-btn" onclick="clearOrders()">Clear Orders</button>
<button class="excel-btn" onclick="toggleGraph()">📊 View Ordering Graph</button>

<div id="ordersList"></div>

<div id="totalSales" class="total"></div>

<div id="topDosa" class="analytics"></div>

<div id="paymentStats" class="analytics"></div>

<div id="chartBox">
<canvas id="salesChart"></canvas>
</div>

</div>

<div class="section">

<h2>🍽 Dine-In Reservations</h2>

<button class="clear-btn" onclick="clearReservations()">Clear Reservations</button>

<div id="reservationList"></div>

</div>

</div>

<script>

let chart;
let lastOrderCount = 0;

function initPage(){
loadData();
setInterval(loadData,5000);
}

function loadData(){

let orders = JSON.parse(localStorage.getItem("dosaClubOrders")) || [];

/* SOUND + WHATSAPP ALERT */

if(orders.length > lastOrderCount){

document.getElementById("orderSound").play();

let newOrder = orders[orders.length-1];

sendWhatsAppAlert(newOrder);

}

lastOrderCount = orders.length;

let orderDiv=document.getElementById("ordersList");
orderDiv.innerHTML="";

let total=0;
let dosaCount={};
let cashTotal=0;
let upiTotal=0;

if(orders.length===0){

orderDiv.innerHTML="<div class='no-data'>No Orders Yet</div>";

document.getElementById("totalSales").innerHTML="";
document.getElementById("topDosa").innerHTML="";
document.getElementById("paymentStats").innerHTML="";

return;
}

let table=`
<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Item</th>
<th>Amount</th>
<th>Address</th>
<th>Payment</th>
<th>Time</th>
<th>Action</th>
</tr>
`;

orders.slice().reverse().forEach((order,index)=>{

total += parseFloat(order.amount);

if(!dosaCount[order.item]){
dosaCount[order.item]=1;
}else{
dosaCount[order.item]++;
}

if(order.paymentMode==="Cash"){
cashTotal += parseFloat(order.amount);
}else{
upiTotal += parseFloat(order.amount);
}

table += `
<tr>
<td>${order.customerName}</td>
<td>${order.phone}</td>
<td>${order.item}</td>
<td>₹${order.amount}</td>
<td>${order.address}</td>
<td>${order.paymentMode}</td>
<td>${order.time}</td>
<td><button class="print-btn" onclick="printBill(${orders.length-1-index})">Print</button></td>
</tr>
`;

});

table+="</table>";

orderDiv.innerHTML=table;

document.getElementById("totalSales").innerHTML="Total Sales Today : ₹"+total;

let topItem="";
let max=0;

for(let item in dosaCount){
if(dosaCount[item]>max){
max=dosaCount[item];
topItem=item;
}
}

document.getElementById("topDosa").innerHTML="🔥 Top Selling Dosa : "+topItem+" ("+max+" orders)";

document.getElementById("paymentStats").innerHTML="💰 Cash Sales : ₹"+cashTotal+" | 📱 UPI Sales : ₹"+upiTotal;

let labels=[];
let data=[];

for(let item in dosaCount){
labels.push(item);
data.push(dosaCount[item]);
}

drawChart(labels,data);

loadReservations();
}

/* WHATSAPP ALERT */

function sendWhatsAppAlert(order){

let phone="9182383301, 9059252124,9618653150";

let message = `🚨 New Order - Raju's Dosa Club

Customer : ${order.customerName}
Phone : ${order.phone}

Item : ${order.item}
Amount : ₹${order.amount}

Payment : ${order.paymentMode}

Address :
${order.address}

Time : ${order.time}`;

let url = "https://wa.me/"+phone+"?text="+encodeURIComponent(message);

window.open(url,"_blank");

}

function drawChart(labels,data){

let ctx=document.getElementById("salesChart");

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Dosa Orders",
data:data
}]
},
options:{
responsive:true
}
});

}

function toggleGraph(){

let chartDiv = document.getElementById("chartBox");

if(chartDiv.style.display==="none"){
chartDiv.style.display="block";
}else{
chartDiv.style.display="none";
}

}

function loadReservations(){

let reservations = JSON.parse(localStorage.getItem("dosaClubReservations")) || [];

let reserveDiv=document.getElementById("reservationList");
reserveDiv.innerHTML="";

if(reservations.length===0){

reserveDiv.innerHTML="<div class='no-data'>No Reservations Yet</div>";

}else{

let table=`
<table>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Seats</th>
<th>Time</th>
</tr>
`;

reservations.slice().reverse().forEach(res=>{

table+=`
<tr>
<td>${res.customerName}</td>
<td>${res.phone}</td>
<td>${res.seats}</td>
<td>${res.time}</td>
</tr>
`;

});

table+="</table>";

reserveDiv.innerHTML=table;

}

}

function printBill(index){

let orders = JSON.parse(localStorage.getItem("dosaClubOrders")) || [];
let order = orders[index];

let billWindow = window.open('', '', 'width=400,height=600');

billWindow.document.write(`
<h2 style="text-align:center;">Raju's Dosa Club</h2>
<hr>
<p><b>Name:</b> ${order.customerName}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Item:</b> ${order.item}</p>
<p><b>Amount:</b> ₹${order.amount}</p>
<p><b>Payment:</b> ${order.paymentMode}</p>
<p><b>Address:</b> ${order.address}</p>
<p><b>Time:</b> ${order.time}</p>
<hr>
<h3 style="text-align:center;">Thank You! Visit Again 🙏</h3>
`);

billWindow.document.close();
billWindow.print();

}

function downloadExcel(){

let orders = JSON.parse(localStorage.getItem("dosaClubOrders")) || [];

if(orders.length===0){
alert("No orders available");
return;
}

let csv="Name,Phone,Item,Amount,Address,Payment,Time\n";

orders.forEach(order=>{
csv += `${order.customerName},${order.phone},${order.item},${order.amount},${order.address},${order.paymentMode},${order.time}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

let today=new Date().toISOString().slice(0,10);

link.download="Raju_Dosa_Club_Sales_"+today+".csv";

link.click();

}

function clearOrders(){
if(confirm("Are you sure to clear all orders?")){
localStorage.removeItem("dosaClubOrders");
loadData();
}
}

function clearReservations(){
if(confirm("Are you sure to clear all reservations?")){
localStorage.removeItem("dosaClubReservations");
loadData();
}
}

</script>

</body>

</html>
